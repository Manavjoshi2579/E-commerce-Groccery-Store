# Final HTTPS nginx config for Hostinger VPS. Replace domains only if production domains change.
# /etc/nginx/sites-available/eagle-mart.

upstream eagle_mart_frontend {
  server 127.0.0.1:3000;
}

upstream eagle_mart_backend {
  server 127.0.0.1:4000;
}

server {
  listen 80;
  listen [::]:80;
  server_name eaglesclub.in www.eaglesclub.in api.eaglesclub.in;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name eaglesclub.in www.eaglesclub.in;

  ssl_certificate /etc/letsencrypt/live/eaglesclub.in/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/eaglesclub.in/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
  client_max_body_size 25m;
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  location / {
    proxy_pass http://eagle_mart_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  location /_next/static/ {
    proxy_pass http://eagle_mart_frontend;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.eaglesclub.in;

  ssl_certificate /etc/letsencrypt/live/api.eaglesclub.in/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.eaglesclub.in/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
  client_max_body_size 25m;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  location / {
    proxy_pass http://eagle_mart_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
}
