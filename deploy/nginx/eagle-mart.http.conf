# Initial nginx config used only before certificates exist.
# Replace yourdomain.com and api.yourdomain.com before copying this file to
# /etc/nginx/sites-available/eagle-mart.

server {
  listen 80;
  listen [::]:80;
  server_name yourdomain.com www.yourdomain.com api.yourdomain.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 200 "Eagle Mart SSL bootstrap is ready.\n";
    add_header Content-Type text/plain;
  }
}
